services:
  cassandra-node1:
    image: cassandra:4.1
    container_name: cassandra-node1
    hostname: cassandra-node1
    environment:
      - CASSANDRA_CLUSTER_NAME=ActivityLogCluster
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_SEEDS=cassandra-node1,cassandra-node2,cassandra-node3
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    ports:
      - "9042:9042"  # Main contact point for application
      - "7000:7000"  # Inter-node communication
      - "7001:7001"  # SSL inter-node communication
    volumes:
      - cassandra-node1-data:/var/lib/cassandra
    networks:
      - cassandra-network
    healthcheck:
      test: [ "CMD-SHELL", "nodetool status | grep -E '^UN'" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  cassandra-node2:
    image: cassandra:4.1
    container_name: cassandra-node2
    hostname: cassandra-node2
    environment:
      - CASSANDRA_CLUSTER_NAME=ActivityLogCluster
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_SEEDS=cassandra-node1,cassandra-node2,cassandra-node3
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    ports:
      - "7002:7000"  # Inter-node communication
      - "7003:7001"  # SSL inter-node communication
    volumes:
      - cassandra-node2-data:/var/lib/cassandra
    networks:
      - cassandra-network
    depends_on:
      - cassandra-node1
    healthcheck:
      test: [ "CMD-SHELL", "nodetool status | grep -E '^UN'" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  cassandra-node3:
    image: cassandra:4.1
    container_name: cassandra-node3
    hostname: cassandra-node3
    environment:
      - CASSANDRA_CLUSTER_NAME=ActivityLogCluster
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_SEEDS=cassandra-node1,cassandra-node2,cassandra-node3
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    ports:
      - "7004:7000"  # Inter-node communication
      - "7005:7001"  # SSL inter-node communication
    volumes:
      - cassandra-node3-data:/var/lib/cassandra
    networks:
      - cassandra-network
    depends_on:
      - cassandra-node1
      - cassandra-node2
    healthcheck:
      test: [ "CMD-SHELL", "nodetool status | grep -E '^UN'" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  cassandra-node1-data:
  cassandra-node2-data:
  cassandra-node3-data:

networks:
  cassandra-network:
    driver: bridge
